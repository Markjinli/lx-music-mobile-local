name: Build Release APK (Debug Signed)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  Android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Patch signing config to use debug keystore
        shell: bash
        run: |
          # 注释掉 build.gradle 中覆盖 debug 签名的行，让 release 使用 debug 签名
          sed -i 's/signingConfig signingConfigs.release/\/\/ signingConfig signingConfigs.release/' android/app/build.gradle

      - name: Build Release APK with Debug Keystore
        env:
          DISABLE_SVG: 1
        shell: bash
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: Generate file MD5
        run: |
          cd android/app/build/outputs/apk/release
          md5sum *.apk

      - name: Upload Artifacts
        uses: ./.github/actions/upload-artifact
        env:
          PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}

      - name: Create Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          name: v${{ env.PACKAGE_VERSION }} (支持本地音乐版)
          body: |
            ## LX Music 移动版 v${{ env.PACKAGE_VERSION }}（支持本地音乐）

            在原版基础上新增**本地音乐**功能：在设置中选择本地文件夹并扫描音频文件，自动创建"本地音乐"列表。

            ### 与原版差异
            - 新增「本地音乐」扫描导入功能
            - 详细改动见 [README](https://github.com/Markjinli/lx-music-mobile-local#fork-说明)

            > 使用 debug 签名构建，安装前需卸载原版或使用不同的 applicationId。
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
