name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  Android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Create debug keystore for Gradle config phase
        shell: bash
        run: |
          # signingConfigs.release 块在配置阶段就需要 keystore 或 -P 参数
          # 生成一个 dummy keystore 以满足配置阶段校验
          mkdir -p "$HOME/.android"
          keytool -genkey -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt 2>/dev/null || true

      - name: Patch build.gradle to use debug signing for release
        shell: bash
        run: |
          # build.gradle 第 164 行 signingConfig signingConfigs.release 会覆盖第 160 行的 debug 签名
          # 删除该行，让 release 构建使用 debug.keystore 签名（JS 正常打包进 APK）
          sed -i '/^[[:space:]]*signingConfig signingConfigs\.release$/d' android/app/build.gradle

      - name: Build Release APK
        env:
          DISABLE_SVG: 1
        shell: bash
        run: |
          cd android
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE="$HOME/.android/debug.keystore" \
            -PMYAPP_UPLOAD_KEY_ALIAS="androiddebugkey" \
            -PMYAPP_UPLOAD_STORE_PASSWORD="android" \
            -PMYAPP_UPLOAD_KEY_PASSWORD="android"

      - name: Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: Generate file MD5
        run: |
          cd android/app/build/outputs/apk/release
          md5sum *.apk

      - name: Create Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          name: v${{ env.PACKAGE_VERSION }} (支持本地音乐版)
          body: |
            ## LX Music 移动版 v${{ env.PACKAGE_VERSION }}（支持本地音乐）

            在原版基础上新增**本地音乐**功能：在设置中选择本地文件夹并扫描音频文件，自动创建"本地音乐"列表。

            ### 与原版差异
            - 新增「本地音乐」扫描导入功能
            - 详细改动见 [README](https://github.com/Markjinli/lx-music-mobile-local#fork-说明)

            > 使用 debug 签名构建，安装前需卸载原版。
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
